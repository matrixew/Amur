<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Amur Burgers</title>
    <style>
        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --gold: #C9A84C;
            --gold-light: #E8D5A3;
            --gold-dark: #A8893A;
            --dark: #0A0A0A;
            --dark-card: #121212;
            --dark-card-hover: #1A1A1A;
            --text: #F0F0F0;
            --text-muted: #888888;
            --text-light: #AAAAAA;
            --radius: 16px;
            --radius-sm: 10px;
            --shadow: 0 20px 60px rgba(0, 0, 0, 0.9);
            --transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif;
            background: var(--dark);
            color: var(--text);
            line-height: 1.5;
            padding-bottom: 100px;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: var(--dark);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--gold);
            border-radius: 10px;
        }

        img {
            display: block;
            max-width: 100%;
            height: auto;
        }

        button {
            font: inherit;
            cursor: pointer;
            border: none;
            outline: none;
            background: none;
            color: inherit;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        /* ===== HEADER ===== */
        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(10, 10, 10, 0.96);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-bottom: 1px solid rgba(201, 168, 76, 0.08);
            padding: 14px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header__logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header__logo-icon {
            width: 42px;
            height: 42px;
            background: var(--gold);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
            color: var(--dark);
            letter-spacing: 1px;
        }

        .header__logo-text {
            font-weight: 300;
            font-size: 20px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .header__logo-text span {
            color: var(--gold);
            font-weight: 600;
        }

        .header__cart {
            position: relative;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 18px 10px 14px;
            background: var(--gold);
            border-radius: 50px;
            color: var(--dark);
            font-weight: 600;
            font-size: 14px;
            transition: var(--transition);
            box-shadow: 0 4px 24px rgba(201, 168, 76, 0.15);
            letter-spacing: 0.3px;
        }

        .header__cart:active {
            transform: scale(0.95);
        }

        .header__cart svg {
            width: 20px;
            height: 20px;
        }

        .header__cart-badge {
            position: absolute;
            top: -6px;
            right: -6px;
            background: #E74C3C;
            color: #fff;
            font-size: 10px;
            font-weight: 700;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 12px rgba(231, 76, 60, 0.4);
            transition: var(--transition);
        }

        .header__cart-badge.hidden {
            opacity: 0;
            transform: scale(0.5);
            pointer-events: none;
        }

        /* ===== CATEGORY TABS ===== */
        .tabs {
            position: sticky;
            top: 70px;
            z-index: 99;
            background: rgba(10, 10, 10, 0.98);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 12px 16px 14px;
            display: flex;
            gap: 6px;
            overflow-x: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
            border-bottom: 1px solid rgba(201, 168, 76, 0.05);
        }

        .tabs::-webkit-scrollbar {
            display: none;
        }

        .tab-btn {
            flex-shrink: 0;
            padding: 8px 18px;
            border-radius: 50px;
            font-weight: 500;
            font-size: 13px;
            color: var(--text-muted);
            background: rgba(255, 255, 255, 0.03);
            transition: var(--transition);
            border: 1px solid transparent;
            white-space: nowrap;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .tab-btn.active {
            background: var(--gold);
            color: var(--dark);
            border-color: var(--gold);
            box-shadow: 0 4px 24px rgba(201, 168, 76, 0.15);
            font-weight: 600;
        }

        .tab-btn:active {
            transform: scale(0.94);
        }

        /* ===== MAIN ===== */
        .main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px 16px 30px;
        }

        /* ===== CATEGORY SECTIONS ===== */
        .category {
            display: none;
            animation: fadeIn 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .category.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .category__title {
            font-size: 26px;
            font-weight: 200;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 4px;
            color: var(--text);
        }

        .category__title span {
            color: var(--gold);
            font-weight: 600;
        }

        .category__sub {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 20px;
            display: inline-block;
            letter-spacing: 1px;
            text-transform: uppercase;
            border-left: 2px solid var(--gold);
            padding-left: 12px;
        }

        /* ===== PRODUCT GRID ===== */
        .products {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
        }

        /* ===== PRODUCT CARD ===== */
        .product {
            background: var(--dark-card);
            border-radius: var(--radius);
            overflow: hidden;
            transition: var(--transition);
            border: 1px solid rgba(255, 255, 255, 0.04);
            display: flex;
            flex-direction: column;
        }

        .product:active {
            transform: scale(0.97);
        }

        .product__image {
            width: 100%;
            aspect-ratio: 1/1;
            background: #161616;
            position: relative;
            overflow: hidden;
        }

        .product__image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: var(--transition);
        }

        .product:hover .product__image img {
            transform: scale(1.04);
        }

        .product__image .placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a1a1a, #0d0d0d);
            color: var(--text-muted);
            font-size: 14px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .product__badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--gold);
            color: var(--dark);
            font-size: 9px;
            font-weight: 700;
            padding: 3px 12px;
            border-radius: 50px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .product__body {
            padding: 14px 16px 16px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .product__name {
            font-weight: 500;
            font-size: 14px;
            line-height: 1.3;
            min-height: 36px;
            letter-spacing: 0.3px;
        }

        .product__price {
            font-weight: 600;
            font-size: 17px;
            color: var(--gold);
            letter-spacing: 0.5px;
        }

        .product__price small {
            font-weight: 400;
            font-size: 12px;
            color: var(--text-muted);
            letter-spacing: 0.3px;
        }

        .product__actions {
            display: flex;
            gap: 8px;
            margin-top: 4px;
        }

        .product__btn {
            flex: 1;
            padding: 9px 0;
            border-radius: 50px;
            font-weight: 500;
            font-size: 12px;
            transition: var(--transition);
            text-align: center;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            background: rgba(201, 168, 76, 0.08);
            color: var(--gold);
            border: 1px solid rgba(201, 168, 76, 0.12);
        }

        .product__btn:active {
            transform: scale(0.94);
        }

        .product__btn.primary {
            background: var(--gold);
            color: var(--dark);
            border-color: var(--gold);
        }

        .product__btn.primary:active {
            background: var(--gold-dark);
        }

        .product__btn.in-cart {
            background: rgba(46, 204, 113, 0.1);
            color: #2ECC71;
            border-color: rgba(46, 204, 113, 0.15);
        }

        .product__qty-control {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
        }

        .product__qty-control button {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            font-weight: 400;
            font-size: 18px;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .product__qty-control button:active {
            transform: scale(0.88);
            background: rgba(255, 255, 255, 0.1);
        }

        .product__qty-control span {
            font-weight: 500;
            font-size: 15px;
            min-width: 24px;
            text-align: center;
        }

        /* ===== CART MODAL ===== */
        .cart-overlay {
            position: fixed;
            inset: 0;
            z-index: 200;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: none;
            align-items: flex-end;
            justify-content: center;
            animation: fadeOverlay 0.3s ease;
        }

        .cart-overlay.open {
            display: flex;
        }

        @keyframes fadeOverlay {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .cart-modal {
            background: var(--dark-card);
            border-radius: var(--radius) var(--radius) 0 0;
            max-width: 520px;
            width: 100%;
            max-height: 88vh;
            display: flex;
            flex-direction: column;
            padding: 24px 24px 28px;
            animation: slideCart 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            border-top: 1px solid rgba(201, 168, 76, 0.08);
        }

        @keyframes slideCart {
            from {
                transform: translateY(40px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .cart-modal__header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 18px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        }

        .cart-modal__title {
            font-size: 20px;
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .cart-modal__close {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.04);
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }

        .cart-modal__close:active {
            transform: scale(0.88);
            background: rgba(255, 255, 255, 0.08);
        }

        .cart-modal__items {
            flex: 1;
            overflow-y: auto;
            padding: 14px 0 18px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .cart-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 10px 14px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: var(--radius-sm);
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .cart-item__image {
            width: 48px;
            height: 48px;
            border-radius: 8px;
            overflow: hidden;
            flex-shrink: 0;
            background: #1a1a1a;
        }

        .cart-item__image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .cart-item__info {
            flex: 1;
            min-width: 0;
        }

        .cart-item__name {
            font-weight: 500;
            font-size: 14px;
            letter-spacing: 0.3px;
        }

        .cart-item__price {
            font-size: 13px;
            color: var(--gold);
            font-weight: 600;
        }

        .cart-item__qty {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .cart-item__qty button {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.04);
            font-size: 16px;
            font-weight: 300;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }

        .cart-item__qty button:active {
            transform: scale(0.88);
        }

        .cart-item__qty span {
            font-weight: 500;
            font-size: 15px;
            min-width: 20px;
            text-align: center;
        }

        .cart-item__remove {
            color: var(--text-muted);
            font-size: 16px;
            opacity: 0.3;
            transition: var(--transition);
            padding: 4px;
        }

        .cart-item__remove:active {
            opacity: 1;
            transform: scale(0.88);
        }

        .cart-modal__empty {
            text-align: center;
            color: var(--text-muted);
            padding: 40px 0;
            font-size: 14px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .cart-modal__footer {
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            padding-top: 18px;
        }

        .cart-modal__total {
            display: flex;
            justify-content: space-between;
            font-weight: 300;
            font-size: 20px;
            letter-spacing: 1px;
            margin-bottom: 16px;
        }

        .cart-modal__total span:last-child {
            color: var(--gold);
            font-weight: 600;
        }

        .cart-modal__form {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .cart-modal__form input {
            padding: 14px 18px;
            border-radius: var(--radius-sm);
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: var(--text);
            font-size: 15px;
            transition: var(--transition);
            width: 100%;
            letter-spacing: 0.3px;
        }

        .cart-modal__form input::placeholder {
            color: var(--text-muted);
        }

        .cart-modal__form input:focus {
            border-color: var(--gold);
            outline: none;
            background: rgba(255, 255, 255, 0.06);
        }

        .cart-modal__submit {
            padding: 16px;
            border-radius: var(--radius-sm);
            background: var(--gold);
            color: var(--dark);
            font-weight: 600;
            font-size: 15px;
            transition: var(--transition);
            width: 100%;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .cart-modal__submit:active {
            transform: scale(0.97);
            background: var(--gold-dark);
        }

        .cart-modal__submit:disabled {
            opacity: 0.4;
            pointer-events: none;
        }

        .cart-modal__status {
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-weight: 500;
            display: none;
            margin-top: 8px;
            letter-spacing: 0.3px;
        }

        .cart-modal__status.success {
            display: block;
            background: rgba(46, 204, 113, 0.08);
            color: #2ECC71;
            border: 1px solid rgba(46, 204, 113, 0.1);
        }

        .cart-modal__status.error {
            display: block;
            background: rgba(231, 76, 60, 0.08);
            color: #E74C3C;
            border: 1px solid rgba(231, 76, 60, 0.1);
        }

        /* ===== FOOTER ===== */
        .footer {
            max-width: 1200px;
            margin: 30px auto 0;
            padding: 20px 16px 10px;
            border-top: 1px solid rgba(201, 168, 76, 0.06);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .footer__halal {
            font-size: 13px;
            color: var(--text-muted);
            letter-spacing: 1px;
        }

        .footer__halal strong {
            color: var(--gold);
            font-weight: 600;
        }

        .footer__phone {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: var(--text-light);
        }

        .footer__phone a {
            color: var(--gold);
            font-weight: 500;
            transition: var(--transition);
        }

        .footer__phone a:active {
            opacity: 0.7;
        }

        /* ===== RESPONSIVE ===== */
        @media (min-width: 600px) {
            .products {
                gap: 18px;
            }

            .product__name {
                font-size: 15px;
                min-height: 40px;
            }

            .product__body {
                padding: 16px 18px 18px;
            }
        }

        @media (min-width: 900px) {
            .products {
                grid-template-columns: repeat(3, 1fr);
                gap: 22px;
            }

            .header {
                padding: 18px 32px;
            }

            .header__logo-text {
                font-size: 24px;
            }

            .main {
                padding: 28px 32px 40px;
            }

            .category__title {
                font-size: 32px;
            }

            .product {
                border-radius: var(--radius);
            }

            .product:hover {
                border-color: rgba(201, 168, 76, 0.15);
                transform: translateY(-3px);
                box-shadow: 0 12px 48px rgba(0, 0, 0, 0.6);
            }

            .product__name {
                font-size: 16px;
                min-height: 42px;
            }

            .product__price {
                font-size: 18px;
            }

            .product__btn {
                padding: 10px 0;
                font-size: 12px;
            }

            .cart-modal {
                border-radius: var(--radius);
                margin-bottom: 20px;
                max-height: 80vh;
            }

            .cart-overlay {
                align-items: center;
            }

            .tabs {
                padding: 14px 32px 16px;
                gap: 8px;
            }

            .tab-btn {
                padding: 10px 24px;
                font-size: 12px;
            }
        }

        @media (min-width: 1200px) {
            .products {
                gap: 28px;
            }

            .main {
                padding: 36px 40px 50px;
            }

            .product__body {
                padding: 20px 22px 22px;
            }

            .product__name {
                font-size: 17px;
                min-height: 46px;
            }
        }

        @media (max-width: 380px) {
            .header__logo-text {
                font-size: 16px;
            }

            .header__cart {
                padding: 8px 12px 8px 10px;
                font-size: 12px;
            }

            .header__cart svg {
                width: 17px;
                height: 17px;
            }

            .product__name {
                font-size: 12px;
                min-height: 30px;
            }

            .product__price {
                font-size: 14px;
            }

            .product__body {
                padding: 10px 12px 12px;
            }

            .product__btn {
                font-size: 10px;
                padding: 7px 0;
            }

            .tab-btn {
                font-size: 11px;
                padding: 6px 14px;
            }

            .category__title {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>

    <!-- ===== HEADER ===== -->
    <header class="header">
        <div class="header__logo">
            <div class="header__logo-icon">AB</div>
            <div class="header__logo-text">Amur <span>Burgers</span></div>
        </div>
        <button class="header__cart" id="cartToggle">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
                <line x1="3" y1="6" x2="21" y2="6"/>
                <path d="M16 10a4 4 0 0 1-8 0"/>
            </svg>
            <span id="cartTotal">0 ₽</span>
            <span class="header__cart-badge hidden" id="cartBadge">0</span>
        </button>
    </header>

    <!-- ===== TABS ===== -->
    <nav class="tabs" id="tabs">
        <button class="tab-btn active" data-category="burgers">Бургеры</button>
        <button class="tab-btn" data-category="tacos">Такос</button>
        <button class="tab-btn" data-category="shawarma">Шаурма</button>
        <button class="tab-btn" data-category="sandwiches">Сэндвичи</button>
        <button class="tab-btn" data-category="snacks">Снеки</button>
        <button class="tab-btn" data-category="drinks">Напитки</button>
        <button class="tab-btn" data-category="sauces">Соусы</button>
        <button class="tab-btn" data-category="addons">Добавки</button>
    </nav>

    <!-- ===== MAIN ===== -->
    <main class="main" id="main">

        <!-- ===== БУРГЕРЫ ===== -->
        <section class="category active" data-category="burgers">
            <h2 class="category__title"><span>Бургеры</span></h2>
            <div class="products" id="products-burgers"></div>
        </section>

        <!-- ===== ТАКОС ===== -->
        <section class="category" data-category="tacos">
            <h2 class="category__title"><span>Такос</span></h2>
            <div class="products" id="products-tacos"></div>
        </section>

        <!-- ===== ШАУРМА ===== -->
        <section class="category" data-category="shawarma">
            <h2 class="category__title"><span>Шаурма / Гиро</span></h2>
            <div class="products" id="products-shawarma"></div>
        </section>

        <!-- ===== СЭНДВИЧИ ===== -->
        <section class="category" data-category="sandwiches">
            <h2 class="category__title"><span>Сэндвичи и хот-доги</span></h2>

        // ============================================================
        //  КОРЗИНА
        // ============================================================
        let cart = {};

        function getProductPrice(product) {
            return product.price || 0;
        }

        function getProductDisplayPrice(product) {
            if (product.price2) {
                return `${product.price} / ${product.price2} ₽`;
            }
            return `${product.price} ₽`;
        }

        function getProductImage(item) {
            return item.image || '';
        }

        function renderProducts(categoryKey) {
            const container = document.getElementById(`products-${categoryKey}`);
            if (!container) return;

            const items = menuData[categoryKey] || [];
            container.innerHTML = items.map(item => `
                <div class="product" data-id="${item.id}">
                    <div class="product__image">
                        ${item.image ? `<img src="${item.image}" alt="${item.name}" loading="lazy">` : `<div class="placeholder">${item.name}</div>`}
                        ${item.price2 ? `<span class="product__badge">2 размера</span>` : ''}
                    </div>
                    <div class="product__body">
                        <div class="product__name">${item.name}</div>
                        <div class="product__price">${getProductDisplayPrice(item)}</div>
                        <div class="product__actions" data-id="${item.id}">
                            ${cart[item.id] ? `
                                <div class="product__qty-control">
                                    <button onclick="updateQuantity('${item.id}', -1)">−</button>
                                    <span>${cart[item.id].quantity}</span>
                                    <button onclick="updateQuantity('${item.id}', 1)">+</button>
                                </div>
                            ` : `
                                <button class="product__btn primary" onclick="addToCart('${item.id}')">В корзину</button>
                            `}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function renderAllCategories() {
            Object.keys(menuData).forEach(key => renderProducts(key));
        }

        function addToCart(productId) {
            const item = findProduct(productId);
            if (!item) return;

            if (cart[productId]) {
                cart[productId].quantity++;
            } else {
                cart[productId] = {
                    ...item,
                    quantity: 1,
                    price: getProductPrice(item)
                };
            }

            updateUI();
        }

        function updateQuantity(productId, delta) {
            if (!cart[productId]) return;

            cart[productId].quantity += delta;

            if (cart[productId].quantity <= 0) {
                delete cart[productId];
            }

            updateUI();
        }

        function removeFromCart(productId) {
            delete cart[productId];
            updateUI();
        }

        function findProduct(id) {
            for (const category of Object.values(menuData)) {
                const found = category.find(item => item.id === id);
                if (found) return found;
            }
            return null;
        }

        function getTotalItems() {
            return Object.values(cart).reduce((sum, item) => sum + item.quantity, 0);
        }

        function getTotalPrice() {
            return Object.values(cart).reduce((sum, item) => sum + (item.price * item.quantity), 0);
        }

        function updateUI() {
            // Обновляем бейдж
            const badge = document.getElementById('cartBadge');
            const totalItems = getTotalItems();
            if (totalItems > 0) {
                badge.textContent = totalItems;
                badge.classList.remove('hidden');
            } else {
                badge.classList.add('hidden');
            }

            // Обновляем сумму в хедере
            document.getElementById('cartTotal').textContent = `${getTotalPrice()} ₽`;

            // Обновляем сумму в модалке
            document.getElementById('cartModalTotal').textContent = `${getTotalPrice()} ₽`;

            // Перерисовываем все товары
            renderAllCategories();
            renderCartItems();
        }

        function renderCartItems() {
            const container = document.getElementById('cartItems');
            const items = Object.values(cart);

            if (items.length === 0) {
                container.innerHTML = `<div class="cart-modal__empty">Корзина пуста</div>`;
                return;
            }

            container.innerHTML = items.map(item => `
                <div class="cart-item">
                    <div class="cart-item__image">
                        ${item.image ? `<img src="${item.image}" alt="${item.name}">` : ''}
                    </div>
                    <div class="cart-item__info">
                        <div class="cart-item__name">${item.name}</div>
                        <div class="cart-item__price">${item.price} ₽</div>
                    </div>
                    <div class="cart-item__qty">
                        <button onclick="updateQuantity('${item.id}', -1)">−</button>
                        <span>${item.quantity}</span>
                        <button onclick="updateQuantity('${item.id}', 1)">+</button>
                    </div>
                    <button class="cart-item__remove" onclick="removeFromCart('${item.id}')">✕</button>
                </div>
            `).join('');
        }

        // ============================================================
        //  ТАБЫ
        // ============================================================
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');

                const category = this.dataset.category;
                document.querySelectorAll('.category').forEach(sec => sec.classList.remove('active'));
                document.querySelector(`.category[data-category="${category}"]`).classList.add('active');
            });
        });

        // ============================================================
        //  КОРЗИНА — ОТКРЫТИЕ / ЗАКРЫТИЕ
        // ============================================================
        const overlay = document.getElementById('cartOverlay');
        const modal = document.getElementById('cartModal');

        document.getElementById('cartToggle').addEventListener('click', () => {
            overlay.classList.add('open');
            renderCartItems();
            document.getElementById('cartModalTotal').textContent = `${getTotalPrice()} ₽`;
            document.getElementById('orderStatus').className = 'cart-modal__status';
            document.getElementById('orderStatus').textContent = '';
        });

        document.getElementById('cartClose').addEventListener('click', () => {
            overlay.classList.remove('open');
        });

        overlay.addEventListener('click', (e) => {
            if (e.target === overlay) overlay.classList.remove('open');
        });

        // ============================================================
        //  ОТПРАВКА В TELEGRAM
        // ============================================================
        const TELEGRAM_BOT_TOKEN = '8944369213:AAHUE5TtO92cj8gBBG8fYAzV1n0muG3H1qM';
        const TELEGRAM_CHAT_ID = '1922216067';

        document.getElementById('orderForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const name = document.getElementById('orderName').value.trim();
            const phone = document.getElementById('orderPhone').value.trim();
            const status = document.getElementById('orderStatus');
            const submitBtn = document.getElementById('orderSubmit');

            if (!name || !phone) {
                status.className = 'cart-modal__status error';
                status.textContent = 'Пожалуйста, заполните имя и телефон';
                return;
            }

            if (Object.keys(cart).length === 0) {
                status.className = 'cart-modal__status error';
                status.textContent = 'Корзина пуста';
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'Отправка...';
            status.className = 'cart-modal__status';
            status.textContent = '';

            // Формируем заказ
            let orderText = '🛒 НОВЫЙ ЗАКАЗ\n\n';
            orderText += `👤 Имя: ${name}\n`;
            orderText += `📱 Телефон: ${phone}\n\n`;
            orderText += `📋 Заказ:\n`;

            Object.values(cart).forEach(item => {
                orderText += `• ${item.name} × ${item.quantity} = ${item.price * item.quantity} ₽\n`;
            });

            orderText += `\n💰 Итого: ${getTotalPrice()} ₽`;

            // Отправка
            const url = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`;
            const body = JSON.stringify({
                chat_id: TELEGRAM_CHAT_ID,
                text: orderText,
                parse_mode: 'HTML'
            });

            let success = false;
            const proxies = [
                `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
                `https://corsproxy.io/?${encodeURIComponent(url)}`,
                `https://cors-anywhere.herokuapp.com/${url}`
            ];

            for (const proxy of proxies) {
                try {
                    const res = await fetch(proxy, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: body
                    });
                    const data = await res.json();
                    if (data.ok) { success = true; break; }
                } catch (err) { continue; }
            }

            if (!success) {
                try {
                    const res = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: body
                    });
                    const data = await res.json();
                    if (data.ok) success = true;
                } catch (err) {}
            }

            if (success) {
                status.className = 'cart-modal__status success';
                status.textContent = '✅ Заказ отправлен! Мы свяжемся с вами.';
                cart = {};
                updateUI();
                renderCartItems();
                document.getElementById('orderForm').reset();
                setTimeout(() => {
                    overlay.classList.remove('open');
                }, 2000);
            } else {
                status.className = 'cart-modal__status error';
                status.textContent = '❌ Ошибка отправки. Позвоните +7 (938) 076-60-88';
            }

            submitBtn.disabled = false;
            submitBtn.textContent = 'Оформить заказ';
        });

        // ============================================================
        //  ИНИЦИАЛИЗАЦИЯ
        // ============================================================
        renderAllCategories();
        updateUI();
    </script>
