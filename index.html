<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Amur Burgers</title>
    <style>
        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --yellow: #FFD700;
            --yellow-light: #FFE44D;
            --yellow-dark: #E6B800;
            --green: #2D5A3D;
            --green-light: #3D7A52;
            --green-dark: #1E3D2A;
            --gray: #8A8A8A;
            --gray-light: #B0B0B0;
            --gray-dark: #5A5A5A;
            --bg: #F5F2EB;
            --bg-card: #FFFFFF;
            --bg-dark: #E8E3D8;
            --text: #1A1A1A;
            --text-muted: #6B6B6B;
            --shadow: 0 8px 32px rgba(45, 90, 61, 0.10);
            --shadow-hover: 0 12px 48px rgba(45, 90, 61, 0.18);
            --radius: 16px;
            --radius-sm: 10px;
            --transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            padding-bottom: 60px;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--green);
            border-radius: 10px;
        }

        img {
            display: block;
            max-width: 100%;
            height: auto;
        }

        button {
            font: inherit;
            cursor: pointer;
            border: none;
            outline: none;
            background: none;
            color: inherit;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        /* ===== HALAL BANNER TOP ===== */
        .halal-top {
            background: var(--green);
            color: var(--yellow);
            text-align: center;
            padding: 8px 16px;
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            border-bottom: 3px solid var(--yellow);
        }

        .halal-top span {
            background: var(--yellow);
            color: var(--green-dark);
            padding: 2px 12px;
            border-radius: 50px;
            margin: 0 6px;
            font-size: 12px;
        }

        /* ===== HEADER ===== */
        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(245, 242, 235, 0.96);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 2px solid var(--yellow);
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header__logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header__logo-icon {
            width: 40px;
            height: 40px;
            background: var(--green);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
            color: var(--yellow);
            letter-spacing: 0.5px;
        }

        .header__logo-text {
            font-weight: 700;
            font-size: 18px;
            letter-spacing: 0.5px;
            color: var(--green);
        }
        .header__logo-text span {
            color: var(--yellow-dark);
        }

        .header__cart {
            position: relative;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px 8px 12px;
            background: var(--yellow);
            border-radius: 50px;
            color: var(--green-dark);
            font-weight: 700;
            font-size: 13px;
            transition: var(--transition);
            box-shadow: 0 4px 20px rgba(255, 215, 0, 0.25);
        }

        .header__cart:active {
            transform: scale(0.95);
        }

        .header__cart svg {
            width: 18px;
            height: 18px;
        }

        .header__cart-badge {
            position: absolute;
            top: -6px;
            right: -6px;
            background: #E74C3C;
            color: #fff;
            font-size: 10px;
            font-weight: 700;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 12px rgba(231, 76, 60, 0.3);
            transition: var(--transition);
        }

        .header__cart-badge.hidden {
            opacity: 0;
            transform: scale(0.5);
            pointer-events: none;
        }

        /* ===== CATEGORY TABS ===== */
        .tabs {
            position: sticky;
            top: 60px;
            z-index: 99;
            background: rgba(245, 242, 235, 0.98);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 10px 16px 12px;
            display: flex;
            gap: 6px;
            overflow-x: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
            border-bottom: 1px solid rgba(45, 90, 61, 0.06);
        }

        .tabs::-webkit-scrollbar {
            display: none;
        }

        .tab-btn {
            flex-shrink: 0;
            padding: 7px 16px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 12px;
            color: var(--text-muted);
            background: rgba(45, 90, 61, 0.05);
            transition: var(--transition);
            border: 1px solid transparent;
            white-space: nowrap;
            letter-spacing: 0.3px;
        }

        .tab-btn.active {
            background: var(--green);
            color: #fff;
            border-color: var(--green);
            box-shadow: 0 4px 20px rgba(45, 90, 61, 0.12);
        }

        .tab-btn:active {
            transform: scale(0.94);
        }

        /* ===== MAIN ===== */
        .main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 16px 16px 30px;
        }

        /* ===== CATEGORY SECTIONS ===== */
        .category {
            display: none;
            animation: fadeIn 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .category.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .category__title {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
            color: var(--green-dark);
        }

        .category__title span {
            color: var(--yellow-dark);
        }

        .category__sub {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 16px;
            display: inline-block;
            background: var(--yellow);
            padding: 2px 14px;
            border-radius: 50px;
            font-weight: 600;
            color: var(--green-dark);
        }

        /* ===== PRODUCT GRID ===== */
        .products {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        /* ===== PRODUCT CARD ===== */
        .product {
            background: var(--bg-card);
            border-radius: var(--radius);
            overflow: hidden;
            transition: var(--transition);
            border: 1px solid rgba(45, 90, 61, 0.06);
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow);
        }

        .product:active {
            transform: scale(0.97);
        }

        .product:hover {
            box-shadow: var(--shadow-hover);
            transform: translateY(-2px);
            border-color: var(--yellow);
        }

        .product__image {
            width: 100%;
            aspect-ratio: 1/1;
            background: #E8E3D8;
            position: relative;
            overflow: hidden;
        }

        .product__image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: var(--transition);
        }

        .product:hover .product__image img {
            transform: scale(1.04);
        }

        .product__image .placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #E8E3D8, #D5CFC2);
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 500;
        }

        .product__badge {
            position: absolute;
            top: 8px;
            right: 8px;
            background: var(--yellow);
            color: var(--green-dark);
            font-size: 8px;
            font-weight: 700;
            padding: 2px 10px;
            border-radius: 50px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .product__body {
            padding: 12px 14px 14px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .product__name {
            font-weight: 600;
            font-size: 13px;
            line-height: 1.3;
            min-height: 34px;
            color: var(--green-dark);
        }

        .product__price {
            font-weight: 700;
            font-size: 15px;
            color: var(--green);
        }

        .product__price small {
            font-weight: 400;
            font-size: 11px;
            color: var(--text-muted);
        }

        .product__size-select {
            display: flex;
            gap: 5px;
            margin: 3px 0;
        }

        .product__size-btn {
            flex: 1;
            padding: 4px 0;
            border-radius: 50px;
            font-size: 10px;
            font-weight: 600;
            background: rgba(45, 90, 61, 0.05);
            color: var(--text-muted);
            transition: var(--transition);
            border: 2px solid transparent;
        }

        .product__size-btn.active {
            background: var(--yellow);
            color: var(--green-dark);
            border-color: var(--yellow-dark);
        }

        .product__size-btn:active {
            transform: scale(0.94);
        }

        .product__actions {
            display: flex;
            gap: 6px;
            margin-top: 3px;
        }

        .product__btn {
            flex: 1;
            padding: 8px 0;
            border-radius: 50px;
            font-weight: 700;
            font-size: 11px;
            transition: var(--transition);
            text-align: center;
            letter-spacing: 0.3px;
            text-transform: uppercase;
            background: rgba(45, 90, 61, 0.05);
            color: var(--green);
            border: 1px solid rgba(45, 90, 61, 0.08);
        }

        .product__btn:active {
            transform: scale(0.94);
        }

        .product__btn.primary {
            background: var(--yellow);
            color: var(--green-dark);
            border-color: var(--yellow);
        }

        .product__btn.primary:active {
            background: var(--yellow-dark);
        }

        .product__btn.in-cart {
            background: var(--green);
            color: #fff;
            border-color: var(--green);
        }

        .product__qty-control {
            display: flex;
            align-items: center;
            gap: 6px;
            flex: 1;
        }

        .product__qty-control button {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: rgba(45, 90, 61, 0.06);
            font-weight: 400;
            font-size: 16px;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--green);
        }

        .product__qty-control button:active {
            transform: scale(0.88);
            background: rgba(45, 90, 61, 0.12);
        }

        .product__qty-control span {
            font-weight: 600;
            font-size: 14px;
            min-width: 20px;
            text-align: center;
            color: var(--green-dark);
        }

        /* ===== CART MODAL ===== */
        .cart-overlay {
            position: fixed;
            inset: 0;
            z-index: 200;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: none;
            align-items: flex-end;
            justify-content: center;
            animation: fadeOverlay 0.3s ease;
        }

        .cart-overlay.open {
            display: flex;
        }

        @keyframes fadeOverlay {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .cart-modal {
            background: var(--bg-card);
            border-radius: var(--radius) var(--radius) 0 0;
            max-width: 520px;
            width: 100%;
            max-height: 88vh;
            display: flex;
            flex-direction: column;
            padding: 20px 20px 24px;
            animation: slideCart 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            box-shadow: 0 -8px 40px rgba(0, 0, 0, 0.08);
        }

        @keyframes slideCart {
            from {
                transform: translateY(40px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .cart-modal__header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 16px;
            border-bottom: 2px solid var(--yellow);
        }

        .cart-modal__title {
            font-size: 18px;
            font-weight: 800;
            color: var(--green-dark);
        }

        .cart-modal__close {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(45, 90, 61, 0.06);
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            color: var(--text-muted);
        }

        .cart-modal__close:active {
            transform: scale(0.88);
            background: rgba(45, 90, 61, 0.12);
        }

        .cart-modal__items {
            flex: 1;
            overflow-y: auto;
            padding: 12px 0 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .cart-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 12px;
            background: rgba(45, 90, 61, 0.04);
            border-radius: var(--radius-sm);
            border: 1px solid rgba(45, 90, 61, 0.06);
        }

        .cart-item__image {
            width: 44px;
            height: 44px;
            border-radius: 8px;
            overflow: hidden;
            flex-shrink: 0;
            background: #E8E3D8;
        }

        .cart-item__image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .cart-item__info {
            flex: 1;
            min-width: 0;
        }

        .cart-item__name {
            font-weight: 600;
            font-size: 13px;
            color: var(--green-dark);
        }

        .cart-item__size {
            font-size: 11px;
            color: var(--text-muted);
        }

        .cart-item__price {
            font-size: 12px;
            color: var(--green);
            font-weight: 700;
        }

        .cart-item__qty {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .cart-item__qty button {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: rgba(45, 90, 61, 0.06);
            font-size: 14px;
            font-weight: 400;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            color: var(--green);
        }

        .cart-item__qty button:active {
            transform: scale(0.88);
        }

        .cart-item__qty span {
            font-weight: 600;
            font-size: 14px;
            min-width: 18px;
            text-align: center;
            color: var(--green-dark);
        }

        .cart-item__remove {
            color: var(--text-muted);
            font-size: 14px;
            opacity: 0.3;
            transition: var(--transition);
            padding: 4px;
        }

        .cart-item__remove:active {
            opacity: 1;
            transform: scale(0.88);
        }

        .cart-modal__empty {
            text-align: center;
            color: var(--text-muted);
            padding: 36px 0;
            font-size: 14px;
        }

        .cart-modal__footer {
            border-top: 2px solid var(--yellow);
            padding-top: 16px;
        }

        .cart-modal__total {
            display: flex;
            justify-content: space-between;
            font-weight: 700;
            font-size: 18px;
            margin-bottom: 14px;
            color: var(--green-dark);
        }

        .cart-modal__total span:last-child {
            color: var(--green);
            font-weight: 800;
        }

        .cart-modal__form {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .cart-modal__form input {
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            background: rgba(45, 90, 61, 0.04);
            border: 2px solid rgba(45, 90, 61, 0.08);
            color: var(--text);
            font-size: 14px;
            transition: var(--transition);
            width: 100%;
        }

        .cart-modal__form input::placeholder {
            color: var(--text-muted);
        }

        .cart-modal__form input:focus {
            border-color: var(--yellow);
            outline: none;
            background: rgba(45, 90, 61, 0.06);
        }

        .cart-modal__submit {
            padding: 14px;
            border-radius: var(--radius-sm);
            background: var(--yellow);
            color: var(--green-dark);
            font-weight: 700;
            font-size: 15px;
            transition: var(--transition);
            width: 100%;
            letter-spacing: 0.5px;
            border: 2px solid var(--yellow);
        }

        .cart-modal__submit:active {
            transform: scale(0.97);
            background: var(--yellow-dark);
            border-color: var(--yellow-dark);
        }

        .cart-modal__submit:disabled {
            opacity: 0.4;
            pointer-events: none;
        }

        .cart-modal__status {
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            font-size: 12px;
            font-weight: 600;
            display: none;
            margin-top: 6px;
        }

        .cart-modal__status.success {
            display: block;
            background: rgba(45, 90, 61, 0.08);
            color: var(--green);
            border: 1px solid rgba(45, 90, 61, 0.1);
        }

        .cart-modal__status.error {
            display: block;
            background: rgba(231, 76, 60, 0.08);
            color: #E74C3C;
            border: 1px solid rgba(231, 76, 60, 0.1);
        }

        /* ===== HALAL BANNER BOTTOM ===== */
        .halal-bottom {
            max-width: 1200px;
            margin: 30px auto 0;
            padding: 16px 20px;
            background: var(--green);
            border-radius: var(--radius);
            text-align: center;
            color: var(--yellow);
            font-weight: 700;
            font-size: 18px;
            letter-spacing: 2px;
            text-transform: uppercase;
            border: 2px solid var(--yellow);
            box-shadow: 0 8px 32px rgba(45, 90, 61, 0.15);
        }

        .halal-bottom span {
            background: var(--yellow);
            color: var(--green-dark);
            padding: 4px 16px;
            border-radius: 50px;
            margin: 0 8px;
            font-size: 16px;
        }

        /* ===== RESPONSIVE ===== */
        @media (min-width: 600px) {
            .products {
                gap: 16px;
            }

            .product__name {
                font-size: 14px;
                min-height: 38px;
            }

            .product__body {
                padding: 14px 16px 16px;
            }
        }

        @media (min-width: 900px) {
            .products {
                grid-template-columns: repeat(3, 1fr);
                gap: 20px;
            }

            .header {
                padding: 14px 32px;
            }

            .header__logo-text {
                font-size: 22px;
            }

            .main {
                padding: 24px 32px 40px;
            }

            .category__title {
                font-size: 30px;
            }

            .product {
                border-radius: var(--radius);
            }

            .product:hover {
                transform: translateY(-4px);
                box-shadow: var(--shadow-hover);
                border-color: var(--yellow);
            }

            .product__name {
                font-size: 15px;
                min-height: 40px;
            }

            .product__price {
                font-size: 17px;
            }

            .product__btn {
                padding: 9px 0;
                font-size: 11px;
            }

            .cart-modal {
                border-radius: var(--radius);
                margin-bottom: 20px;
                max-height: 80vh;
            }

            .cart-overlay {
                align-items: center;
            }

            .tabs {
                padding: 12px 32px 14px;
                gap: 8px;
            }

            .tab-btn {
                padding: 9px 22px;
                font-size: 13px;
            }

            .halal-top {
                font-size: 16px;
                padding: 10px 20px;
            }

            .halal-bottom {
                font-size: 22px;
                padding: 20px 30px;
            }
        }

        @media (min-width: 1200px) {
            .products {
                gap: 24px;
            }

            .main {
                padding: 32px 40px 50px;
            }

            .product__body {
                padding: 18px 20px 20px;
            }

            .product__name {
                font-size: 16px;
                min-height: 44px;
            }
        }

        @media (max-width: 380px) {
            .header__logo-text {
                font-size: 15px;
            }

            .header__cart {
                padding: 6px 12px 6px 10px;
                font-size: 11px;
            }

            .header__cart svg {
                width: 16px;
                height: 16px;
            }

            .product__name {
                font-size: 11px;
                min-height: 28px;
            }

            .product__price {
                font-size: 13px;
            }

            .product__body {
                padding: 8px 10px 10px;
            }

            .product__btn {
                font-size: 9px;
                padding: 6px 0;
            }

            .tab-btn {
                font-size: 10px;
                padding: 5px 12px;
            }

            .category__title {
                font-size: 18px;
            }

            .halal-top {
                font-size: 11px;
                padding: 6px 12px;
            }

            .halal-bottom {
                font-size: 14px;
                padding: 12px 16px;
            }
        }
    </style>
</head>
<body>

    <!-- ===== HALAL BANNER TOP ===== -->
    <div class="halal-top">
        HALAL Все блюда сертифицированы
    </div>

    <!-- ===== HEADER ===== -->
    <header class="header">
        <div class="header__logo">
            <div class="header__logo-icon">AB</div>
            <div class="header__logo-text">Amur <span>Burgers</span></div>
        </div>
        <button class="header__cart" id="cartToggle">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
                <line x1="3" y1="6" x2="21" y2="6"/>
                <path d="M16 10a4 4 0 0 1-8 0"/>
            </svg>

        let cart = {};

        function getProductPrice(product, size) {
            if (size === 'large' && product.price2) {
                return product.price2;
            }
            return product.price || 0;
        }

        function getProductDisplayPrice(product) {
            if (product.price2) {
                return product.price + ' / ' + product.price2 + ' ₽';
            }
            return product.price + ' ₽';
        }

        function getProductImage(item) {
            return item.image || '';
        }

        function renderProducts(categoryKey) {
            const container = document.getElementById('products-' + categoryKey);
            if (!container) return;

            const items = menuData[categoryKey] || [];
            container.innerHTML = items.map(item => {
                const hasSize = !!item.price2;
                const cartItem = cart[item.id];
                const selectedSize = cartItem ? cartItem.size : 'small';

                return `
                    <div class="product" data-id="${item.id}">
                        <div class="product__image">
                            ${item.image ? '<img src="' + item.image + '" alt="' + item.name + '" loading="lazy">' : '<div class="placeholder">' + item.name + '</div>'}
                            ${hasSize ? '<span class="product__badge">2 размера</span>' : ''}
                        </div>
                        <div class="product__body">
                            <div class="product__name">${item.name}</div>
                            <div class="product__price">${getProductDisplayPrice(item)}</div>
                            ${hasSize ? `
                                <div class="product__size-select">
                                    <button class="product__size-btn ${selectedSize === 'small' ? 'active' : ''}" onclick="selectSize('${item.id}', 'small')">Маленький</button>
                                    <button class="product__size-btn ${selectedSize === 'large' ? 'active' : ''}" onclick="selectSize('${item.id}', 'large')">Большой</button>
                                </div>
                            ` : ''}
                            <div class="product__actions" data-id="${item.id}">
                                ${cart[item.id] ? `
                                    <div class="product__qty-control">
                                        <button onclick="updateQuantity('${item.id}', -1)">−</button>
                                        <span>${cart[item.id].quantity}</span>
                                        <button onclick="updateQuantity('${item.id}', 1)">+</button>
                                    </div>
                                ` : `
                                    <button class="product__btn primary" onclick="addToCart('${item.id}')">В корзину</button>
                                `}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function selectSize(productId, size) {
            if (!cart[productId]) {
                const item = findProduct(productId);
                if (!item) return;
                cart[productId] = {
                    ...item,
                    quantity: 0,
                    size: size,
                    price: getProductPrice(item, size)
                };
            } else {
                cart[productId].size = size;
                const item = findProduct(productId);
                if (item) {
                    cart[productId].price = getProductPrice(item, size);
                }
            }
            renderAllCategories();
            updateUI();
        }

        function renderAllCategories() {
            Object.keys(menuData).forEach(key => renderProducts(key));
        }

        function addToCart(productId) {
            const item = findProduct(productId);
            if (!item) return;

            if (cart[productId]) {
                cart[productId].quantity++;
            } else {
                const size = item.price2 ? 'small' : 'small';
                cart[productId] = {
                    ...item,
                    quantity: 1,
                    size: size,
                    price: getProductPrice(item, size)
                };
            }

            updateUI();
        }

        function updateQuantity(productId, delta) {
            if (!cart[productId]) return;

            cart[productId].quantity += delta;

            if (cart[productId].quantity <= 0) {
                delete cart[productId];
            }

            updateUI();
        }

        function removeFromCart(productId) {
            delete cart[productId];
            updateUI();
        }

        function findProduct(id) {
            for (const category of Object.values(menuData)) {
                const found = category.find(item => item.id === id);
                if (found) return found;
            }
            return null;
        }

        function getTotalItems() {
            return Object.values(cart).reduce((sum, item) => sum + item.quantity, 0);
        }

        function getTotalPrice() {
            return Object.values(cart).reduce((sum, item) => sum + (item.price * item.quantity), 0);
        }

        function updateUI() {
            const badge = document.getElementById('cartBadge');
            const totalItems = getTotalItems();
            if (totalItems > 0) {
                badge.textContent = totalItems;
                badge.classList.remove('hidden');
            } else {
                badge.classList.add('hidden');
            }

            document.getElementById('cartTotal').textContent = getTotalPrice() + ' ₽';
            document.getElementById('cartModalTotal').textContent = getTotalPrice() + ' ₽';

            renderAllCategories();
            renderCartItems();
        }

        function renderCartItems() {
            const container = document.getElementById('cartItems');
            const items = Object.values(cart);

            if (items.length === 0) {
                container.innerHTML = '<div class="cart-modal__empty">Корзина пуста</div>';
                return;
            }

            container.innerHTML = items.map(item => {
                const sizeLabel = item.size === 'large' ? 'Большой' : 'Маленький';
                return `
                    <div class="cart-item">
                        <div class="cart-item__image">
                            ${item.image ? '<img src="' + item.image + '" alt="' + item.name + '">' : ''}
                        </div>
                        <div class="cart-item__info">
                            <div class="cart-item__name">${item.name}</div>
                            ${item.price2 ? '<div class="cart-item__size">' + sizeLabel + '</div>' : ''}
                            <div class="cart-item__price">${item.price} ₽</div>
                        </div>
                        <div class="cart-item__qty">
                            <button onclick="updateQuantity('${item.id}', -1)">−</button>
                            <span>${item.quantity}</span>
                            <button onclick="updateQuantity('${item.id}', 1)">+</button>
                        </div>
                        <button class="cart-item__remove" onclick="removeFromCart('${item.id}')">✕</button>
                    </div>
                `;
            }).join('');
        }

        //  ТАБЫ
        // ============================================================
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));

            if (!name || !phone) {

                status.textContent = 'Пожалуйста, заполните имя и телефон';

                const sizeLabel = item.size === 'large' ? ' (Большой)' : item.price2 ? ' (Маленький)' : '';

            });

            orderText += '\nИтого: ' + getTotalPrice() + ' ₽';

            const url = 'https://api.telegram.org/bot' + TELEGRAM_BOT_TOKEN + '/sendMessage';
            const body = JSON.stringify({
                chat_id: TELEGRAM_CHAT_ID,
                text: orderText,
                parse_mode: 'HTML'
            });

            let success = false;
            const proxies = [
                'https://api.allorigins.win/raw?url=' + encodeURIComponent(url),
                'https://corsproxy.io/?' + encodeURIComponent(url),
                'https://cors-anywhere.herokuapp.com/' + url
            ];

            for (const proxy of proxies) {
                try {
                    const res = await fetch(proxy, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: body
                    });
                    const data = await res.json();
                    if (data.ok) { success = true; break; }
                } catch (err) { continue; }
            }

            if (!success) {
                try {
                    const res = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: body
                    });
                    const data = await res.json();
                    if (data.ok) success = true;
                } catch (err) {}
            }

            if (success) {
                status.className = 'cart-modal__status success';
                status.textContent = 'Заказ отправлен! Мы свяжемся с вами.';
                cart = {};
                updateUI();
                renderCartItems();
                document.getElementById('orderForm').reset();
                setTimeout(() => {
                    overlay.classList.remove('open');
                }, 2000);
            } else {
                status.className = 'cart-modal__status error';
                status.textContent = 'Ошибка отправки. Позвоните нам';
            }

            submitBtn.disabled = false;
            submitBtn.textContent = 'Оформить заказ';
        });

        // ============================================================
        //  ИНИЦИАЛИЗАЦИЯ
        // ============================================================
        renderAllCategories();
        updateUI();
    </script>

</body>
</html>
